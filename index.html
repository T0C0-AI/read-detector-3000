<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>읽씹 판독기 3000 🔮</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%231a0040'/><rect x='4' y='4' width='92' height='92' rx='20' fill='none' stroke='%23ff2ed1' stroke-width='5'/><text x='50' y='52' font-size='58' text-anchor='middle' dominant-baseline='central'>🔮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{ --mag:#ff2ed1; --cyan:#00f0ff; --yel:#fff200; --bg:#190034; }
  *{ box-sizing:border-box; margin:0; }
  body{
    font-family:'Jua',sans-serif; color:#fff; min-height:100vh;
    background:var(--bg) radial-gradient(circle at 50% 0,#4a0080,#0a0018 70%) fixed;
    display:flex; justify-content:center; padding:24px 16px; overflow-x:hidden;
  }
  .machine{
    width:100%; max-width:430px; background:linear-gradient(160deg,#2b005c,#15002e);
    border:4px solid var(--mag); border-radius:26px; padding:26px 22px 30px;
    box-shadow:0 0 28px var(--mag),0 0 60px rgba(0,240,255,.4),inset 0 0 30px rgba(255,46,209,.25);
    position:relative;
  }
  h1{
    font-family:'Black Han Sans'; text-align:center; font-size:33px; line-height:1.15;
    background:linear-gradient(90deg,var(--cyan),var(--yel),var(--mag));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 8px var(--mag)); animation:hue 3s linear infinite;
  }
  @keyframes hue{ to{ filter:drop-shadow(0 0 8px var(--mag)) hue-rotate(360deg); } }
  .acc{ text-align:center; color:var(--yel); font-size:15px; margin:4px 0 18px; animation:blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:.35; } }
  label{ display:block; color:var(--cyan); font-size:15px; margin-bottom:7px; }
  textarea{
    width:100%; height:84px; resize:none; padding:12px; font-family:inherit; font-size:16px;
    color:#fff; background:rgba(0,0,0,.45); border:2px solid var(--cyan); border-radius:12px; outline:none;
  }
  textarea:focus{ border-color:var(--yel); box-shadow:0 0 14px var(--yel); }
  button{
    width:100%; margin-top:14px; padding:16px; font-family:'Black Han Sans'; font-size:19px;
    color:#190034; background:linear-gradient(90deg,var(--yel),var(--mag)); border:none;
    border-radius:14px; cursor:pointer; box-shadow:0 0 16px var(--mag); transition:transform .1s;
  }
  button:active{ transform:scale(.96); }
  .ai-btn{ background:linear-gradient(90deg,#7b2fff,#00f0ff); color:#fff; font-size:16px; box-shadow:0 0 16px #7b2fff; margin-top:9px; }
  #screen{ margin-top:22px; min-height:30px; }
  .loading{ text-align:center; }
  .loading p{ color:var(--cyan); font-size:17px; margin-bottom:10px; }
  .bar{ height:18px; background:rgba(0,0,0,.5); border:2px solid var(--cyan); border-radius:20px; overflow:hidden; }
  .bar i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--mag),var(--yel)); animation:fill 1.5s ease forwards; }
  @keyframes fill{ to{ width:100%; } }
  .result{ text-align:center; animation:pop .45s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pop{ 0%{ transform:scale(.3) rotate(-8deg); opacity:0; } }
  .badge{ display:inline-block; font-family:'Black Han Sans'; font-size:13px; color:#190034;
    background:var(--cyan); padding:3px 13px; border-radius:20px; margin-bottom:8px; box-shadow:0 0 12px var(--cyan); }
  .verdict{ font-family:'Black Han Sans'; font-size:30px; line-height:1.25; margin:6px 0 12px;
    color:var(--yel); text-shadow:0 0 12px var(--mag); }
  .desc{ font-size:17px; color:#fff; line-height:1.6; }
  .stat{ margin-top:14px; padding:11px; font-size:14px; color:var(--cyan);
    background:rgba(0,0,0,.4); border:1px dashed var(--cyan); border-radius:10px; }
  .again{ margin-top:8px; }
  .grade{ display:inline-block; font-family:'Black Han Sans'; font-size:15px; padding:4px 18px;
    border-radius:20px; color:#190034; margin-bottom:10px; }
  .glabel{ color:var(--cyan); font-size:14px; text-align:center; margin-top:6px; }
  .gauge{ height:22px; background:rgba(0,0,0,.5); border:2px solid var(--cyan); border-radius:20px; overflow:hidden; margin:5px 0; }
  .gauge i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--cyan),var(--mag),var(--yel)); transition:width 1s ease; }
  .score-num{ font-family:'Black Han Sans'; font-size:28px; color:var(--yel); text-shadow:0 0 10px var(--mag); }
  .rlabel{ color:var(--cyan); font-size:15px; text-align:center; margin-top:18px; margin-bottom:2px; }
  .reply{ display:flex; align-items:center; gap:9px; background:rgba(0,0,0,.35); border:1px solid #6a3aa0;
    border-radius:10px; padding:9px 11px; margin-top:7px; text-align:left; }
  .reply em{ font-style:normal; font-size:11px; color:var(--mag); white-space:nowrap; font-family:'Black Han Sans'; }
  .reply span{ flex:1; font-size:14px; color:#fff; }
  .reply button{ width:auto; margin:0; padding:6px 11px; font-size:12px; border-radius:8px;
    box-shadow:none; background:var(--cyan); color:#190034; }
  .quiz-title{ font-family:'Black Han Sans'; color:var(--yel); font-size:16px; margin-bottom:6px; }
  .quiz-q{ color:var(--cyan); font-size:13px; margin:11px 0 5px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ font-family:'Jua',sans-serif; font-size:13px; padding:7px 12px; border-radius:20px; user-select:none;
    text-align:center; background:rgba(0,0,0,.3); border:1.5px solid #6a3aa0; color:#cbb6e8; cursor:pointer; transition:.12s; }
  .chip.on{ background:var(--mag); border-color:var(--yel); color:#fff; box-shadow:0 0 12px var(--mag); }
  .draft{ width:100%; margin-top:10px; padding:11px 13px; font-family:inherit; font-size:15px; color:#fff;
    background:rgba(0,0,0,.4); border:2px dashed #6a3aa0; border-radius:12px; outline:none; }
  .draft:focus{ border-color:var(--yel); }
  .coach-btn{ background:linear-gradient(90deg,#3ad17a,#00f0ff); color:#190034; }
  .actions{ display:flex; gap:8px; margin-top:14px; }
  .actions button{ margin-top:0; font-size:15px; padding:13px; }
  .share-btn{ background:linear-gradient(90deg,var(--yel),var(--mag)); }
  .dex-btn{ background:linear-gradient(90deg,#7b2fff,#00f0ff); color:#fff; }
  .modal{ position:fixed; inset:0; background:rgba(10,0,25,.86); display:flex; justify-content:center;
    align-items:flex-start; padding:36px 16px; overflow-y:auto; z-index:9; }
  .modal-box{ width:100%; max-width:430px; background:linear-gradient(160deg,#2b005c,#15002e);
    border:3px solid var(--mag); border-radius:20px; padding:22px; box-shadow:0 0 30px var(--mag); }
  .modal-box h2{ font-family:'Black Han Sans'; color:var(--yel); text-align:center; font-size:22px; margin-bottom:14px; }
  .dex-item{ display:flex; align-items:center; gap:10px; padding:9px 11px; margin-bottom:7px;
    background:rgba(0,0,0,.35); border-radius:10px; border-left:5px solid #888; }
  .dex-item b{ font-family:'Black Han Sans'; font-size:14px; }
  .dex-item span{ flex:1; font-size:13px; color:#fff; }
  .dex-empty{ text-align:center; color:#9b6ad6; padding:24px 0; }
  .close-btn{ background:#4a3a66; color:#fff; }
  .confetti{ position:fixed; top:-24px; width:11px; height:16px; z-index:20; pointer-events:none; border-radius:2px;
    animation:fall 2.6s linear forwards; }
  @keyframes fall{ to{ transform:translateY(108vh) rotate(720deg); opacity:.35; } }
  @keyframes shake{ 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }
  .shake{ animation:shake .55s; }
  .foot{ text-align:center; color:#9b6ad6; font-size:11px; margin-top:20px; }
</style>
</head>
<body>
<main class="machine">
  <h1>읽씹 판독기<br>3000 🔮</h1>
  <p class="acc">🔬 정확도 99.9% 보장 🔬</p>

  <p class="quiz-title">🔍 본격 판독 전, 너희 사이 좀 불자</p>
  <div class="quiz" id="quiz"></div>
  <input id="who" class="draft" style="margin-top:0" placeholder="🏷️ (선택) 상대 별명 — 호감도 변화를 추적하려면 입력">
  <label>📨 상대 카톡 한 줄, 또는 대화 전체를 붙여넣어</label>
  <textarea id="msg" placeholder="예) 자니?
또는 카톡 대화를 통째로 복붙"></textarea>
  <button onclick="scan()">🎰 무료 즉석 판독 🎰</button>
  <button class="ai-btn" onclick="somScan()">💘 썸 판독 (AI 관계분석) 💘</button>
  <input id="draft" class="draft" placeholder="✍️ (선택) 내가 보낼 답장 — 검사받고 싶으면 여기 입력">
  <button class="coach-btn" onclick="coachScan()">✍️ 내 답장 검사받기 ✍️</button>

  <div id="screen"></div>
  <p class="foot">※ 본 판독기는 과학적 근거가 1도 없습니다</p>
</main>

<script>
// 무료(키워드) 판독용 데이터
const R = [
  { v:'💀 답장하면 호구 💀', d:['이거 답장하는 순간 너만 호구된다. 읽씹이 정답이야 ㅇㅇ','감히 이걸 답장한다고? 자존심 어디감. 그냥 씹어 🖐️','와 이 메시지에 진심 고민함? 읽씹 박고 잊어버려'] },
  { v:'🔥 지금 당장 답장 🔥', d:['튕길 짬밥 아님. 1초컷 답장 안 하면 후회한다 진짜','이건 진심임이 판독됨. 지금 답장 안 하면 평생 후회 ㅇㅇ','오 이거 놓치면 바보. 광속 답장 ㄱㄱ 🚀'] },
  { v:'🧊 5분만 튕겨 🧊', d:['바로 답하면 없어보임. 딱 5분만 폰 엎어놔','읽고 바로? 없어보인다. 5분 숙성 후 답장이 국룰','지금 답하면 만만해보임. 5분 텀 두고 쿨한 척해'] },
  { v:'🚫 손절각 ㄱㄱ 🚫', d:['이거 딱 봐도 수상함. 손절이 이득이다 차단 ㄱㄱ','돈 냄새 난다. 거르는 게 효도야','관계 가성비 최악. 차단 추천 🗑️'] }
];
const STATS = [
  '이거 답장한 사람의 87%가 다음날 후회함',
  '비슷한 메시지 1,204건 분석 결과 도출됨',
  '전국 읽씹러 92%가 같은 판독을 받음',
  '양자 연애 알고리즘 신뢰도 99.4%',
  '이 판독을 무시한 사람 3명 중 2명이 흑역사 생성'
];
const STEPS = ['삐------빅 🤖','메시지 스캔중...','양자 알고리즘 가동...','상대 흑심 분석중...','딥러닝 99.9% 도달!'];
const AI_STEPS = ['🛰️ 초월 AI 접속...','신경망 풀가동...','상대 진심 0.001% 단위 해부...','우주의 기운 수집중...','초월 판독 완료!'];
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

// 사전 심문: 칩으로 관계 맥락 입력받아 AI에 함께 넘긴다
const QUIZ = [
  { k:'사이', q:'지금 무슨 사이?', opts:['썸🔥','짝사랑😢','그린라이트인 줄👀','전 애인💀','소개팅 1회🍽️','그냥 아는 사이😐','나도 모름🤷'] },
  { k:'안 지', q:'안 지 얼마나 됐어?', opts:['오늘 처음👶','며칠','몇 주','몇 달','1년+💍','직접 본 적 없음📱'] },
  { k:'내 목표', q:'넌 뭘 원해?', opts:['사귀고 싶음💕','그냥 궁금🤔','손절각 재는 중✂️'] },
  { k:'적극성', q:'누가 더 들이대?', opts:['내가 더🙋','상대가 더','서로 안 함😶','모름'] },
  { k:'연락 스타일', q:'평소 연락은 어떤 식?', opts:['매일 함📞','하루에도 여러 번🔥','가끔🙂','며칠에 한 번','내가 먼저만🙋','상대가 먼저 자주💌','읽고 늦게 답🐢','새벽에만🌙','거의 안 함🚫','들쭉날쭉🎲'] },
  { k:'지금 미션', q:'🎯 지금 뭐 하려고?', opts:['그냥 떠보기👀','고백할까💘','사과해야 됨🙏','거절하고 싶음🙅','화해하고 싶음🤝','밀당 중😼','약속 잡기📅'] },
];
const picks = {};
function renderQuiz(){
  const root = document.getElementById('quiz');
  QUIZ.forEach(g => {
    const qd = document.createElement('div'); qd.className='quiz-q'; qd.textContent = g.q; root.append(qd);
    const cs = document.createElement('div'); cs.className='chips';
    g.opts.forEach(opt => {
      const c = document.createElement('div'); c.className='chip'; c.textContent = opt;
      c.onclick = ()=>{ picks[g.k] = opt; [...cs.children].forEach(ch => ch.classList.toggle('on', ch === c)); };
      cs.append(c);
    });
    root.append(cs);
  });
}
renderQuiz();

function showLoading(steps){
  const s = document.getElementById('screen');
  s.innerHTML = '<div class="loading"><p id="step"></p><div class="bar"><i></i></div></div>';
  document.getElementById('step').textContent = steps[0];
  let n = 0;
  return setInterval(()=>{ n++; if(n<steps.length) document.getElementById('step').textContent = steps[n]; }, 300);
}
// AI 응답은 신뢰할 수 없으므로 전부 textContent로만 넣어 XSS를 차단한다
function renderResult(v, desc, stat, againFn, badge){
  const s = document.getElementById('screen'); s.innerHTML = '';
  const box = document.createElement('div'); box.className = 'result';
  if(badge){ const b = document.createElement('div'); b.className='badge'; b.textContent=badge; box.append(b); }
  const vt = document.createElement('div'); vt.className='verdict'; vt.textContent=v; box.append(vt);
  const dp = document.createElement('p'); dp.className='desc'; dp.textContent=desc; box.append(dp);
  const st = document.createElement('div'); st.className='stat'; st.textContent='📊 '+stat; box.append(st);
  const btn = document.createElement('button'); btn.className='again'; btn.textContent='🎰 다시 판독 🎰'; btn.onclick=againFn; box.append(btn);
  s.append(box);
}
function keyword(raw){
  if(/돈|빌려|투자|코인|다단계|보험|대출|송금|계좌/.test(raw)) return 3;
  if(/자니|자\?|뭐해|심심|ㅎㅇ|놀자|새벽/.test(raw)) return 0;
  if(/사랑|보고싶|좋아|미안|고마워|축하|선물/.test(raw)) return 1;
  if(raw.includes('?')||/어때|할까|언제|어디|먹을|만날/.test(raw)) return 2;
  return Math.floor(Math.random()*4);
}
function scan(){
  const raw = document.getElementById('msg').value.trim();
  if(!raw){ alert('카톡을 안 넣었잖아 ㅋㅋ 넣어봐'); return; }
  const t = showLoading(STEPS);
  setTimeout(()=>{ clearInterval(t); const r = R[keyword(raw)]; renderResult(r.v, pick(r.d), pick(STATS), scan); }, 1550);
}
const GRADES = { SSR:{c:'#ffd700',n:'전설'}, SR:{c:'#c77dff',n:'레어'}, R:{c:'#00f0ff',n:'노말+'}, N:{c:'#999',n:'흔함'} };
const RLAB = ['😎 쿨하게','🥰 귀엽게','😏 밀당'];
function showErr(e, retry){
  const s = document.getElementById('screen'); s.innerHTML = '';
  const box = document.createElement('div'); box.className='result';
  const p = document.createElement('p'); p.className='desc'; p.textContent = '😵 '+e.message; box.append(p);
  const b = document.createElement('button'); b.className='again'; b.textContent='다시 시도'; b.onclick=retry; box.append(b);
  s.append(box);
}
// AI 응답은 신뢰 못 하므로 전부 textContent, 점수는 0~100으로 제한해 넣는다
function renderSom(d, ctxPayload, who){
  const s = document.getElementById('screen'); s.innerHTML = '';
  const box = document.createElement('div'); box.className='result';
  const g = GRADES[d.grade] || GRADES.N;
  const gb = document.createElement('div'); gb.className='grade';
  gb.style.background = g.c; gb.style.boxShadow = '0 0 14px '+g.c;
  gb.textContent = '등급 '+(GRADES[d.grade]?d.grade:'N')+' · '+g.n; box.append(gb);
  const vt = document.createElement('div'); vt.className='verdict'; vt.textContent = d.verdict || '❓'; box.append(vt);
  const score = Math.max(0, Math.min(100, parseInt(d.score) || 0));
  const gl = document.createElement('div'); gl.className='glabel'; gl.textContent='💘 호감도'; box.append(gl);
  const ga = document.createElement('div'); ga.className='gauge'; const gi = document.createElement('i'); ga.append(gi); box.append(ga);
  const sn = document.createElement('div'); sn.className='score-num'; sn.textContent = score+'%'; box.append(sn);
  setTimeout(()=>{ gi.style.width = score+'%'; }, 50);
  const dp = document.createElement('p'); dp.className='desc'; dp.style.marginTop='10px'; dp.textContent = d.diagnosis || ''; box.append(dp);
  if(Array.isArray(d.replies) && d.replies.length){
    const rl = document.createElement('div'); rl.className='rlabel'; rl.textContent='💬 이렇게 답장해'; box.append(rl);
    d.replies.slice(0,3).forEach((txt,i)=>{
      const row = document.createElement('div'); row.className='reply';
      const lab = document.createElement('em'); lab.textContent = RLAB[i] || ''; row.append(lab);
      const sp = document.createElement('span'); sp.textContent = txt; row.append(sp);
      const cp = document.createElement('button'); cp.textContent='복사';
      cp.onclick = ()=>{ navigator.clipboard && navigator.clipboard.writeText(txt); cp.textContent='복사됨!'; setTimeout(()=>cp.textContent='복사',1200); };
      const fp = document.createElement('button'); fp.textContent='🔮'; fp.title='이거 보내면?';
      fp.onclick = ()=>futurePredict(txt, ctxPayload);
      row.append(cp, fp); box.append(row);
    });
  }
  const act = document.createElement('div'); act.className='actions';
  const sh = document.createElement('button'); sh.className='share-btn'; sh.textContent='📤 결과 공유';
  sh.onclick = ()=>shareCard(d, score);
  const dx = document.createElement('button'); dx.className='dex-btn'; dx.textContent='📁 내 도감';
  dx.onclick = showDex;
  act.append(sh, dx); box.append(act);
  const again = document.createElement('button'); again.className='again'; again.textContent='💘 다시 썸 판독 💘'; again.onclick=somScan; box.append(again);
  s.append(box);
  saveDex(d, score, who); // 판독할 때마다 도감에 자동 수집 (별명 있으면 호감도 추적)
  if(d.grade === 'SSR' || d.grade === 'SR') celebrate(d.grade === 'SSR' ? 90 : 45);
}
async function somScan(){
  const raw = document.getElementById('msg').value.trim();
  if(!raw){ alert('대화를 안 넣었잖아 ㅋㅋ 넣어봐'); return; }
  const who = document.getElementById('who').value.trim();
  const ctx = QUIZ.map(g => picks[g.k] ? g.k + ': ' + picks[g.k] : null).filter(Boolean).join(' / ');
  const payload = (ctx ? '[관계 정보] ' + ctx + '\n\n[대화]\n' : '') + raw;
  const t = showLoading(AI_STEPS);
  try{
    const [r] = await Promise.all([
      fetch('/judge', { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({ msg: payload, mode:'som' }) }),
      new Promise(res => setTimeout(res, 1550))
    ]);
    const d = await r.json();
    clearInterval(t);
    if(!r.ok) throw new Error(d.error || '판독 실패');
    renderSom(d, payload, who);
  }catch(e){ clearInterval(t); showErr(e, somScan); }
}

// 수집 도감 (브라우저에만 저장, 최근 50개)
const DEX_KEY = 'somtok_dex';
function loadDex(){ try{ return JSON.parse(localStorage.getItem(DEX_KEY)) || []; }catch{ return []; } }
function saveDex(d, score, who){
  const arr = loadDex();
  arr.unshift({ g: GRADES[d.grade] ? d.grade : 'N', v: d.verdict || '', s: score, who: who || '' });
  localStorage.setItem(DEX_KEY, JSON.stringify(arr.slice(0, 50)));
}
function showDex(){
  const arr = loadDex();
  const m = document.createElement('div'); m.className = 'modal';
  const bx = document.createElement('div'); bx.className = 'modal-box';
  const h = document.createElement('h2'); h.textContent = '📁 내 썸 판독 도감 (' + arr.length + ')'; bx.append(h);
  // 별명이 달린 기록은 사람별로 묶어 호감도 변화를 보여준다
  const byWho = {};
  arr.forEach(it => { if(it.who){ (byWho[it.who] = byWho[it.who] || []).push(it); } });
  const names = Object.keys(byWho);
  if(names.length){
    const th = document.createElement('div'); th.className = 'rlabel'; th.style.marginTop = '2px'; th.textContent = '📈 호감도 추적'; bx.append(th);
    names.forEach(nm => {
      const scores = byWho[nm].slice().reverse().map(x => x.s || 0); // 오래된→최신 순
      const first = scores[0], last = scores[scores.length - 1];
      const trend = scores.length < 2 ? '🆕' : (last > first ? '📈 상승' : last < first ? '📉 하락' : '➡️ 유지');
      const row = document.createElement('div'); row.className = 'dex-item'; row.style.borderLeftColor = '#00f0ff';
      const b = document.createElement('b'); b.style.color = '#00f0ff'; b.textContent = '🏷️ ' + nm; row.append(b);
      const sp = document.createElement('span'); sp.textContent = scores.join('% → ') + '%'; row.append(sp);
      const tr = document.createElement('b'); tr.style.color = '#fff200'; tr.style.whiteSpace = 'nowrap'; tr.textContent = trend; row.append(tr);
      bx.append(row);
    });
    const div = document.createElement('div'); div.className = 'rlabel'; div.textContent = '🗂️ 전체 기록'; bx.append(div);
  }
  if(!arr.length){ const e = document.createElement('div'); e.className = 'dex-empty'; e.textContent = '아직 판독 기록이 없어 ㅋㅋ'; bx.append(e); }
  arr.forEach(it => {
    const g = GRADES[it.g] || GRADES.N;
    const row = document.createElement('div'); row.className = 'dex-item'; row.style.borderLeftColor = g.c;
    const b = document.createElement('b'); b.style.color = g.c; b.textContent = it.g; row.append(b);
    const sp = document.createElement('span'); sp.textContent = it.v; row.append(sp);
    const sc = document.createElement('b'); sc.style.color = '#fff200'; sc.textContent = (it.s || 0) + '%'; row.append(sc);
    bx.append(row);
  });
  const c = document.createElement('button'); c.className = 'again close-btn'; c.textContent = '닫기'; c.onclick = ()=>m.remove(); bx.append(c);
  m.append(bx); m.onclick = e => { if(e.target === m) m.remove(); }; document.body.append(m);
}
// 결과를 이미지 카드로 그려서 공유(모바일)/다운로드(PC)
async function shareCard(d, score){
  if(document.fonts) await document.fonts.ready;
  const W = 600, Hh = 600, cv = document.createElement('canvas'); cv.width = W; cv.height = Hh;
  const x = cv.getContext('2d');
  const bg = x.createLinearGradient(0, 0, W, Hh); bg.addColorStop(0, '#3a0070'); bg.addColorStop(1, '#0a0018');
  x.fillStyle = bg; x.fillRect(0, 0, W, Hh);
  const g = GRADES[d.grade] || GRADES.N;
  x.strokeStyle = g.c; x.lineWidth = 10; x.strokeRect(16, 16, W - 32, Hh - 32);
  x.textAlign = 'center';
  x.fillStyle = '#00f0ff'; x.font = "38px 'Black Han Sans',sans-serif"; x.fillText('읽씹 판독기 3000 🔮', W/2, 88);
  x.fillStyle = g.c; x.font = "34px 'Black Han Sans',sans-serif"; x.fillText('등급 ' + (GRADES[d.grade] ? d.grade : 'N') + ' · ' + g.n, W/2, 168);
  x.fillStyle = '#fff200'; x.font = "118px 'Black Han Sans',sans-serif"; x.fillText(score + '%', W/2, 308);
  x.fillStyle = '#00f0ff'; x.font = "26px 'Jua',sans-serif"; x.fillText('💘 호감도', W/2, 352);
  x.fillStyle = '#fff'; x.font = "30px 'Jua',sans-serif"; wrap(x, d.verdict || '', W/2, 432, W - 90, 40);
  x.fillStyle = '#9b6ad6'; x.font = "20px 'Jua',sans-serif"; x.fillText('읽씹 판독기 3000 · somtok', W/2, Hh - 34);
  cv.toBlob(blob => {
    if(!blob) return;
    const file = new File([blob], 'somtok.png', { type: 'image/png' });
    if(navigator.canShare && navigator.canShare({ files: [file] })){ navigator.share({ files: [file], title: '내 썸 판독 결과' }).catch(()=>{}); }
    else { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'somtok.png'; a.click(); URL.revokeObjectURL(a.href); }
  });
}
// 한글은 띄어쓰기가 드물어 글자 단위로 줄바꿈
function wrap(x, text, cx, cy, maxW, lh){
  const chars = [...(text || '')]; let line = '', y = cy;
  for(const c of chars){
    const test = line + c;
    if(x.measureText(test).width > maxW && line){ x.fillText(line, cx, y); line = c; y += lh; }
    else line = test;
  }
  if(line) x.fillText(line, cx, y);
}
// 높은 등급 뜨면 색종이 폭죽 + 기계 흔들림 (가챠 손맛)
function celebrate(n){
  const m = document.querySelector('.machine');
  if(m){ m.classList.remove('shake'); void m.offsetWidth; m.classList.add('shake'); setTimeout(()=>m.classList.remove('shake'), 600); }
  const colors = ['#ff2ed1','#00f0ff','#fff200','#7b2fff','#ffffff'];
  for(let i=0; i<n; i++){
    const p = document.createElement('div'); p.className = 'confetti';
    p.style.left = (Math.random()*100) + 'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.4) + 's';
    p.style.animationDuration = (2.2 + Math.random()*1.2) + 's';
    document.body.append(p);
    setTimeout(()=>p.remove(), 3800);
  }
}
// ✍️ 내 답장 첨삭: 대화 + 내 초안을 코치에게 보내 점수·개선안 받기
async function coachScan(){
  const raw = document.getElementById('msg').value.trim();
  const draft = document.getElementById('draft').value.trim();
  if(!draft){ alert('검사받을 내 답장을 아래 칸에 입력해줘 ㅋㅋ'); return; }
  const ctx = QUIZ.map(g => picks[g.k] ? g.k + ': ' + picks[g.k] : null).filter(Boolean).join(' / ');
  const payload = (ctx ? '[관계 정보] ' + ctx + '\n\n' : '') + (raw ? '[대화]\n' + raw + '\n\n' : '') + '[내 답장 초안]\n' + draft;
  const t = showLoading(AI_STEPS);
  try{
    const [r] = await Promise.all([
      fetch('/judge', { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({ msg: payload, mode:'coach' }) }),
      new Promise(res => setTimeout(res, 1550))
    ]);
    const d = await r.json();
    clearInterval(t);
    if(!r.ok) throw new Error(d.error || '검사 실패');
    renderCoach(d);
  }catch(e){ clearInterval(t); showErr(e, coachScan); }
}
function renderCoach(d){
  const s = document.getElementById('screen'); s.innerHTML = '';
  const box = document.createElement('div'); box.className = 'result';
  const badge = document.createElement('div'); badge.className = 'badge'; badge.textContent = '✍️ 답장 검사'; box.append(badge);
  const vt = document.createElement('div'); vt.className = 'verdict'; vt.textContent = d.verdict || '❓'; box.append(vt);
  const score = Math.max(0, Math.min(100, parseInt(d.score) || 0));
  const gl = document.createElement('div'); gl.className = 'glabel'; gl.textContent = '✍️ 답장 점수'; box.append(gl);
  const ga = document.createElement('div'); ga.className = 'gauge'; const gi = document.createElement('i'); ga.append(gi); box.append(ga);
  const sn = document.createElement('div'); sn.className = 'score-num'; sn.textContent = score + '점'; box.append(sn);
  setTimeout(()=>{ gi.style.width = score + '%'; }, 50);
  const cm = document.createElement('p'); cm.className = 'desc'; cm.style.marginTop = '10px'; cm.textContent = d.comment || ''; box.append(cm);
  if(d.better){
    const rl = document.createElement('div'); rl.className = 'rlabel'; rl.textContent = '✨ 이렇게 고쳐봐'; box.append(rl);
    const row = document.createElement('div'); row.className = 'reply';
    const sp = document.createElement('span'); sp.textContent = d.better; row.append(sp);
    const cp = document.createElement('button'); cp.textContent = '복사';
    cp.onclick = ()=>{ navigator.clipboard && navigator.clipboard.writeText(d.better); cp.textContent = '복사됨!'; setTimeout(()=>cp.textContent = '복사', 1200); };
    row.append(cp); box.append(row);
  }
  const again = document.createElement('button'); again.className = 'again'; again.textContent = '✍️ 다시 검사 ✍️'; again.onclick = coachScan; box.append(again);
  s.append(box);
}
// 🔮 미래 예측: 이 답장을 보내면 상대가 어떻게 반응할지 모달로
async function futurePredict(replyText, ctxPayload){
  const m = document.createElement('div'); m.className = 'modal';
  const bx = document.createElement('div'); bx.className = 'modal-box';
  m.append(bx); m.onclick = e => { if(e.target === m) m.remove(); }; document.body.append(m);
  const h = document.createElement('h2'); h.textContent = '🔮 이거 보내면?'; bx.append(h);
  const loading = document.createElement('p'); loading.className = 'desc'; loading.textContent = '상대 반응 예측 중... 🛰️'; bx.append(loading);
  try{
    const body = (ctxPayload || '') + '\n\n[내가 보낼 답장]\n' + replyText;
    const r = await fetch('/judge', { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({ msg: body, mode:'future' }) });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || '예측 실패');
    loading.remove();
    const RISK = { '안전':'#3ad17a', '도박':'#fff200', '위험':'#ff4d6d' };
    const rc = RISK[d.risk] || '#888';
    const rk = document.createElement('div'); rk.className = 'grade'; rk.style.background = rc; rk.style.boxShadow = '0 0 14px ' + rc;
    rk.textContent = '⚠️ ' + (d.risk || '?'); bx.append(rk);
    const qt = document.createElement('div'); qt.className = 'reply'; const qs = document.createElement('span');
    qs.textContent = '"' + replyText + '"'; qt.append(qs); bx.append(qt);
    const re = document.createElement('div'); re.className = 'verdict'; re.style.fontSize = '22px'; re.textContent = d.reaction || ''; bx.append(re);
    const de = document.createElement('p'); de.className = 'desc'; de.textContent = d.detail || ''; bx.append(de);
  }catch(e){ loading.textContent = '😵 ' + e.message; }
  const c = document.createElement('button'); c.className = 'again close-btn'; c.textContent = '닫기'; c.onclick = ()=>m.remove(); bx.append(c);
}
